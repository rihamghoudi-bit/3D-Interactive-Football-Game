<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>3D Football Experience - Ultra Real</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; text-align: center; z-index: 10; pointer-events: none; }
        .score { font-size: 50px; font-weight: 900; text-shadow: 0 0 15px rgba(255, 255, 0, 0.8); color: #ffff00; }
        #cam_preview { position: absolute; top: 10px; left: 10px; width: 160px; height: 120px; border: 2px solid white; border-radius: 8px; z-index: 5; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score" id="score">0</div>
        <div style="font-size: 14px; letter-spacing: 2px;">VUE JOUEUR - FRAPPEZ AVEC L'INDEX</div>
    </div>

    <div id="cam_preview">
        <video id="input_video"></video>
    </div>

    <script>
        let score = 0;
        let ball, ballVel = { x: 0, y: 0, z: 0 };
        let isMoving = false;
        let lastY = 0;

        // --- 1. MOTEUR 3D (THREE.JS) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a); // Stade de nuit
        const camera3D = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lumières stade (Projecteurs)
        const light = new THREE.SpotLight(0xffffff, 1.5);
        light.position.set(0, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 0.5));

        // Terrain
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(60, 100),
            new THREE.MeshPhongMaterial({ color: 0x1a472a })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // BALLON (Blanc et Jaune)
        const ballGeo = new THREE.SphereGeometry(0.35, 32, 32);
        const ballMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        ball = new THREE.Mesh(ballGeo, ballMat);
        
        // Ajout de rayures jaunes pour le style
        const stripe = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.05, 16, 100), new THREE.MeshBasicMaterial({color: 0xffff00}));
        ball.add(stripe);
        
        ball.position.set(0, 0.35, -2);
        scene.add(ball);

        // CHEBKA (Cage 7m)
        const goalGroup = new THREE.Group();
        const postMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const postGeo = new THREE.CylinderGeometry(0.1, 0.1, 4.5);
        
        const lp = new THREE.Mesh(postGeo, postMat); lp.position.set(-3.5, 2.25, -25);
        const rp = new THREE.Mesh(postGeo, postMat); rp.position.set(3.5, 2.25, -25);
        const tp = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 7), postMat);
        tp.rotation.z = Math.PI/2; tp.position.set(0, 4.5, -25);

        // Filet (Visualisation de l'intérieur)
        const netMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.2 });
        const net = new THREE.Mesh(new THREE.BoxGeometry(7, 4.5, 2), netMat);
        net.position.set(0, 2.25, -26);

        goalGroup.add(lp, rp, tp, net);
        scene.add(goalGroup);

        // POSITION CAMERA (Vue par-dessus l'épaule)
        camera3D.position.set(0, 2.5, 5); 
        camera3D.lookAt(0, 0, -15);

        // --- 2. LOGIQUE IA (MEDIAPIPE) ---
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const index = res.multiHandLandmarks[0][8];
                
                // Correction de la direction (Miroir inversé pour correspondre au mouvement)
                let currentX = (index.x - 0.5) * 8; 
                let currentY = index.y;

                // Tir si mouvement rapide vers le haut
                if (lastY - currentY > 0.08 && !isMoving) {
                    isMoving = true;
                    ballVel.z = -(lastY - currentY) * 60; // Force vers l'avant
                    ballVel.x = -currentX * 1.5; // Direction latérale synchronisée
                    ballVel.y = 0.15; // Hauteur
                }
                lastY = currentY;
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 480, height: 360
        });
        camera.start();

        // --- 3. ANIMATION ET PHYSIQUE ---
        function reset() {
            isMoving = false;
            ball.position.set(0, 0.35, -2);
            ballVel = { x: 0, y: 0, z: 0 };
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isMoving) {
                ball.position.x += ballVel.x;
                ball.position.y += ballVel.y;
                ball.position.z += ballVel.z;
                ball.rotation.x += 0.1; // Rotation visuelle

                // Gravité
                if (ball.position.y > 0.35) ballVel.y -= 0.008;
                else { ball.position.y = 0.35; ballVel.y *= -0.4; }

                // Vérifier BUT (7m de large = -3.5 à 3.5)
                if (ball.position.z < -24.5 && ball.position.z > -26) {
                    if (Math.abs(ball.position.x) < 3.5 && ball.position.y < 4.5) {
                        score++;
                        document.getElementById('score').innerText = score;
                        isMoving = false;
                        setTimeout(reset, 800);
                    }
                }

                // Reset si la balle sort
                if (ball.position.z < -35 || Math.abs(ball.position.x) > 15) {
                    reset();
                }
            }

            renderer.render(scene, camera3D);
        }
        animate();

        window.addEventListener('resize', () => {
            camera3D.aspect = window.innerWidth / window.innerHeight;
            camera3D.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
